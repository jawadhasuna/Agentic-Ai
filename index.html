<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATOM AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .chat-container {
        width: 100%;
        max-width: 450px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(249, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        height: 80vh;
        overflow: hidden;
      }
      .chat-header {
        background: #cf80be;
        color: white;
        padding: 20px;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .message {
        padding: 12px 16px;
        border-radius: 20px;
        max-width: 80%;
        line-height: 1.4;
        font-size: 18px;
      }
      .user-msg {
        background: #637493;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .bot-msg {
        background: #acacac;
        color: #000;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      /* --- NEW: Style for the typing indicator --- */
      .loading {
        font-style: italic;
        color: #444;
        opacity: 0.8;
      }
      .input-area {
        display: flex;
        border-top: 1px solid #eee;
        padding: 15px;
        background: #fff;
      }
      .input-area input {
        flex: 1;
        padding: 12px 15px;
        border: 1px solid #ccc;
        border-radius: 25px;
        outline: none;
        font-size: 14px;
      }
      .input-area button {
        background: #000;
        color: white;
        border: none;
        padding: 10px 20px;
        margin-left: 10px;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
      }
      .mic-btn {
        background: #8889bc !important;
        margin-left: 8px !important;
        padding: 10px 14px !important;
        font-size: 16px;
      }
      .mic-btn.listening {
        background: #d9534f !important;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
      .voice-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #555;
        padding: 6px 15px 0 15px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">ATOM AI</div>
      <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Hello! This is Atom, Farmaiye?</div>
      </div>
      <div class="voice-toggle">
        <input type="checkbox" id="voice-reply-toggle" checked />
        <label for="voice-reply-toggle">Speak replies aloud</label>
      </div>
      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button class="mic-btn" id="mic-btn" onclick="toggleListening()">
          🎤
        </button>
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      // Correct: Only one definition pointing to your local bridge
      const MODEL_URL = "/api/chat";

      // ---------- VOICE: Speech-to-Text (mic input) ----------
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let isListening = false;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US"; // change to "ur-PK" if you want Urdu recognition

        recognition.onstart = () => {
          isListening = true;
          document.getElementById("mic-btn").classList.add("listening");
        };

        recognition.onend = () => {
          isListening = false;
          document.getElementById("mic-btn").classList.remove("listening");
        };

        recognition.onerror = (event) => {
          isListening = false;
          document.getElementById("mic-btn").classList.remove("listening");
          console.error("Speech recognition error:", event.error);
        };

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          document.getElementById("user-input").value = transcript;
          sendMessage(); // auto-send once you stop talking
        };
      } else {
        console.warn("SpeechRecognition not supported in this browser.");
      }

      function toggleListening() {
        if (!recognition) {
          alert("Voice input isn't supported in this browser. Try Chrome.");
          return;
        }
        if (isListening) {
          recognition.stop();
        } else {
          // Stop the bot from talking so it doesn't overlap with your mic input
          if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
          }
          recognition.start();
        }
      }

      // ---------- VOICE: Text-to-Speech (bot replies) ----------
      function speak(text) {
        const voiceToggle = document.getElementById("voice-reply-toggle");
        if (!voiceToggle.checked) return;
        if (!("speechSynthesis" in window)) return;

        window.speechSynthesis.cancel(); // stop any current speech first
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
      }

      async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.trim();

        if (!message) return;

        // Print the User's Message
        const userDiv = document.createElement("div");
        userDiv.className = "message user-msg";
        userDiv.textContent = message;
        chatBox.appendChild(userDiv);
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Print the "Typing..." Indicator
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message bot-msg loading";
        loadingDiv.id = "loading-msg";
        loadingDiv.textContent = "Thora Sa Sabr, Kijiye...";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          // Correct: Sending only the message object to your bridge
          const response = await fetch(MODEL_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: message }),
          });

          const data = await response.json();

          const loadingElement = document.getElementById("loading-msg");
          if (loadingElement) loadingElement.remove();

          let botReply = "Sorry, I couldn't process that.";

          // The Router sends the reply back in "choices"
          if (data && data.choices && data.choices.length > 0) {
            botReply = data.choices[0].message.content.trim();
          } else if (data.error) {
            botReply = `API Error: ${data.error.message || data.error}`;
          }

          const botDiv = document.createElement("div");
          botDiv.className = "message bot-msg";
          botDiv.textContent = botReply;
          chatBox.appendChild(botDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
          speak(botReply);
        } catch (error) {
          const loadingElement = document.getElementById("loading-msg");
          if (loadingElement) loadingElement.remove();

          const errorDiv = document.createElement("div");
          errorDiv.className = "message bot-msg";
          errorDiv.textContent = "System Error: " + error.message;
          chatBox.appendChild(errorDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      document
        .getElementById("user-input")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") sendMessage();
        });
    </script>
  </body>
</html>
